# =============================================================================
# SearXNG Configuration
# Tuned for programmatic / LLM usage — JSON API enabled, UI minimal.
# use_default_settings: true means we only need to override what differs.
# =============================================================================

use_default_settings: true

general:
  debug: false
  instance_name: "ai-browsing-mcp"

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "en"
  formats:
    - html
    - json

server:
  secret_key: "change-this-secret-key-in-production"
  bind_address: "0.0.0.0"
  port: 8080
  base_url: false
  image_proxy: false

# Redis-backed rate limiter for internal LLM usage
redis:
  url: redis://redis:6379/0

ui:
  static_use_hash: true
  default_locale: "en"
  results_on_new_tab: false

# Explicitly enable only the engines we want
engines:
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false

  - name: brave
    engine: brave
    shortcut: brave
    disabled: false

  - name: bing
    engine: bing
    shortcut: bing
    disabled: false

outgoing:
  request_timeout: 8.0
  max_request_timeout: 15.0
  pool_connections: 100
  pool_maxsize: 20
  enable_http2: true
